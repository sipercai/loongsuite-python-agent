# LoongSuite Extension

[tox]
requires = 
  tox-uv>=1
isolated_build = True
skipsdist = True
skip_missing_interpreters = True
envlist =
    ; Environments are organized by individual package, allowing
    ; for specifying supported Python versions per package.

    ; FIXME(cirilla-zmh): refactor test of original instrumentation module

    ; loongsuite-instrumentation-agentscope
    py3{10,11,12,13}-test-loongsuite-instrumentation-agentscope-oldest
    py3{11,12,13}-test-loongsuite-instrumentation-agentscope-latest
    lint-loongsuite-instrumentation-agentscope

    ; loongsuite-instrumentation-dashscope
    py3{9,10,11,12,13}-test-loongsuite-instrumentation-dashscope-{oldest,latest}
    lint-loongsuite-instrumentation-dashscope

    ; loongsuite-instrumentation-claude-agent-sdk
    py3{10,11,12,13}-test-loongsuite-instrumentation-claude-agent-sdk-{oldest,latest}
    lint-loongsuite-instrumentation-claude-agent-sdk

    ; loongsuite-instrumentation-google-adk
    py3{9,10,11,12,13}-test-loongsuite-instrumentation-google-adk-{oldest,latest}
    lint-loongsuite-instrumentation-google-adk

    ; loongsuite-instrumentation-agno
    py3{9,10,11,12,13}-test-loongsuite-instrumentation-agno
    lint-loongsuite-instrumentation-agno

    ; ; loongsuite-instrumentation-dify
    ; py3{9,10,11,12,13}-test-loongsuite-instrumentation-dify
    ; lint-loongsuite-instrumentation-dify

    ; loongsuite-instrumentation-langchain
    py3{9,10,11,12,13}-test-loongsuite-instrumentation-langchain-{oldest,latest}
    lint-loongsuite-instrumentation-langchain

    ; loongsuite-instrumentation-langgraph
    py3{9,10,11,12,13}-test-loongsuite-instrumentation-langgraph-{oldest,latest}
    lint-loongsuite-instrumentation-langgraph

    ; loongsuite-instrumentation-deepagents
    py3{11,12,13}-test-loongsuite-instrumentation-deepagents-latest
    lint-loongsuite-instrumentation-deepagents

    ; loongsuite-instrumentation-qwen-agent
    py3{9,10,11,12,13}-test-loongsuite-instrumentation-qwen-agent-{oldest,latest}
    lint-loongsuite-instrumentation-qwen-agent

    ; loongsuite-instrumentation-hermes-agent
    py3{10,11,12,13}-test-loongsuite-instrumentation-hermes-agent
    lint-loongsuite-instrumentation-hermes-agent

    ; ; loongsuite-instrumentation-mcp
    ; py3{9,10,11,12,13}-test-loongsuite-instrumentation-mcp
    ; lint-loongsuite-instrumentation-mcp
    
    ; loongsuite-instrumentation-mem0
    py3{10,11,12,13}-test-loongsuite-instrumentation-mem0-{oldest,latest}
    lint-loongsuite-instrumentation-mem0

    ; opentelemetry-util-genai
    py3{9,10,11,12,13,14}-test-util-genai
    pypy3-test-util-genai
    lint-util-genai

    ; LoongSuite CI scripts
    py311-test-detect-loongsuite-changes

    ; license header
    check-license-header

    ; generate tasks
    generate-loongsuite

    ; loongsuite-instrumentation-litellm
    py3{10,11,12,13}-test-loongsuite-instrumentation-litellm
    lint-loongsuite-instrumentation-litellm

    ; loongsuite-instrumentation-crewai
    py3{10,11,12,13}-test-loongsuite-instrumentation-crewai
    lint-loongsuite-instrumentation-crewai

    ; loongsuite-instrumentation-qwenpaw
    py3{10,11,12,13}-test-loongsuite-instrumentation-qwenpaw-{latest,legacy}
    lint-loongsuite-instrumentation-qwenpaw

    ; loongsuite-instrumentation-algotune
    py3{10,11,12,13}-test-loongsuite-instrumentation-algotune
    lint-loongsuite-instrumentation-algotune

    ; loongsuite-instrumentation-bfclv4
    py3{10,11,12,13}-test-loongsuite-instrumentation-bfclv4
    lint-loongsuite-instrumentation-bfclv4

    ; loongsuite-instrumentation-claw-eval
    py3{10,11,12,13}-test-loongsuite-instrumentation-claw-eval
    lint-loongsuite-instrumentation-claw-eval

    ; loongsuite-instrumentation-minisweagent
    py3{10,11,12,13}-test-loongsuite-instrumentation-minisweagent
    lint-loongsuite-instrumentation-minisweagent

    ; loongsuite-instrumentation-openhands
    py3{10,11,12,13}-test-loongsuite-instrumentation-openhands
    lint-loongsuite-instrumentation-openhands

    ; loongsuite-instrumentation-slop-code
    py3{10,11,12,13}-test-loongsuite-instrumentation-slop-code
    lint-loongsuite-instrumentation-slop-code

    ; loongsuite-instrumentation-terminus2
    py3{10,11,12,13}-test-loongsuite-instrumentation-terminus2
    lint-loongsuite-instrumentation-terminus2

    ; loongsuite-instrumentation-vita
    py3{10,11,12,13}-test-loongsuite-instrumentation-vita
    lint-loongsuite-instrumentation-vita

    ; loongsuite-instrumentation-webarena
    py3{10,11,12,13}-test-loongsuite-instrumentation-webarena
    lint-loongsuite-instrumentation-webarena

    ; loongsuite-instrumentation-widesearch
    py3{11,12,13}-test-loongsuite-instrumentation-widesearch
    lint-loongsuite-instrumentation-widesearch

    ; loongsuite-instrumentation-wildtool
    py3{10,11,12,13}-test-loongsuite-instrumentation-wildtool
    lint-loongsuite-instrumentation-wildtool

[testenv]
test_deps =
  opentelemetry-api@{env:CORE_REPO}\#egg=opentelemetry-api&subdirectory=opentelemetry-api
  opentelemetry-semantic-conventions@{env:CORE_REPO}\#egg=opentelemetry-semantic-conventions&subdirectory=opentelemetry-semantic-conventions
  opentelemetry-sdk@{env:CORE_REPO}\#egg=opentelemetry-sdk&subdirectory=opentelemetry-sdk
  opentelemetry-test-utils@{env:CORE_REPO}\#egg=opentelemetry-test-utils&subdirectory=tests/opentelemetry-test-utils
deps =
  lint: -r dev-requirements.txt
  coverage: pytest
  coverage: pytest-cov

  agentscope-oldest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-agentscope/tests/requirements.oldest.txt
  agentscope-latest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-agentscope/tests/requirements.latest.txt
  lint-loongsuite-instrumentation-agentscope: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-agentscope/tests/requirements.oldest.txt

  dashscope-oldest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-dashscope/tests/requirements.oldest.txt
  dashscope-latest: {[testenv]test_deps}
  dashscope-latest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-dashscope/tests/requirements.latest.txt
  lint-loongsuite-instrumentation-dashscope: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-dashscope/tests/requirements.oldest.txt

  claude-agent-sdk-oldest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-claude-agent-sdk/tests/requirements.oldest.txt
  claude-agent-sdk-latest: {[testenv]test_deps}
  claude-agent-sdk-latest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-claude-agent-sdk/tests/requirements.latest.txt
  lint-loongsuite-instrumentation-claude-agent-sdk: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-claude-agent-sdk/tests/requirements.oldest.txt

  google-adk-oldest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-google-adk/tests/requirements.oldest.txt
  google-adk-latest: {[testenv]test_deps}
  google-adk-latest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-google-adk/tests/requirements.latest.txt
  lint-loongsuite-instrumentation-google-adk: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-google-adk/tests/requirements.oldest.txt

  agno: {[testenv]test_deps}
  agno: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-agno/test-requirements.txt

  dify: {[testenv]test_deps}
  dify: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-dify/test-requirements.txt

  langchain-oldest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-langchain/tests/requirements.oldest.txt
  langchain-latest: {[testenv]test_deps}
  langchain-latest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-langchain/tests/requirements.latest.txt
  lint-loongsuite-instrumentation-langchain: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-langchain/tests/requirements.oldest.txt

  langgraph-oldest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-langgraph/tests/requirements.oldest.txt
  langgraph-latest: {[testenv]test_deps}
  langgraph-latest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-langgraph/tests/requirements.latest.txt
  lint-loongsuite-instrumentation-langgraph: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-langgraph/tests/requirements.oldest.txt

  deepagents-latest: {[testenv]test_deps}
  deepagents-latest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-deepagents/tests/requirements.latest.txt
  lint-loongsuite-instrumentation-deepagents: {[testenv]test_deps}
  lint-loongsuite-instrumentation-deepagents: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-deepagents/tests/requirements.latest.txt

  qwen-agent-oldest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-qwen-agent/tests/requirements.oldest.txt
  qwen-agent-latest: {[testenv]test_deps}
  qwen-agent-latest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-qwen-agent/tests/requirements.latest.txt
  lint-loongsuite-instrumentation-qwen-agent: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-qwen-agent/tests/requirements.oldest.txt

  hermes-agent: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-hermes-agent/tests/requirements.txt

  mcp: {[testenv]test_deps}
  mcp: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-mcp/test-requirements.txt

  mem0-oldest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-mem0/tests/requirements.oldest.txt

  mem0-latest: {[testenv]test_deps}
  mem0-latest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-mem0/tests/requirements.latest.txt

  util-genai: {[testenv]test_deps}
  util-genai: -r {toxinidir}/util/opentelemetry-util-genai/test-requirements.txt
  util-genai: {toxinidir}/util/opentelemetry-util-genai

  detect-loongsuite-changes: pytest

  litellm: {[testenv]test_deps}
  litellm: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-litellm/tests/test-requirements.txt

  crewai: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-crewai/tests/test-requirements.txt

  qwenpaw-latest: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-qwenpaw/tests/requirements.latest.txt
  qwenpaw-legacy: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-qwenpaw/tests/requirements.oldest.txt
  lint-loongsuite-instrumentation-qwenpaw: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-qwenpaw/tests/requirements.latest.txt

  algotune: {[testenv]test_deps}
  algotune: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-algotune/test-requirements.txt

  bfclv4: {[testenv]test_deps}
  bfclv4: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-bfclv4/test-requirements.txt

  claw-eval: {[testenv]test_deps}
  claw-eval: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-claw-eval/test-requirements.txt

  minisweagent: {[testenv]test_deps}
  minisweagent: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-minisweagent/test-requirements.txt

  openhands: {[testenv]test_deps}
  openhands: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-openhands/test-requirements.txt

  slop-code: {[testenv]test_deps}
  slop-code: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-slop-code/test-requirements.txt

  terminus2: {[testenv]test_deps}
  terminus2: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-terminus2/test-requirements.txt

  vita: {[testenv]test_deps}
  vita: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-vita/test-requirements.txt

  webarena: {[testenv]test_deps}
  webarena: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-webarena/test-requirements.txt

  widesearch: {[testenv]test_deps}
  widesearch: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-widesearch/test-requirements.txt

  wildtool: {[testenv]test_deps}
  wildtool: -r {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-wildtool/test-requirements.txt

  ; FIXME: add coverage testing
allowlist_externals =
  sh
  pytest

setenv =
  ; override CORE_REPO_SHA via env variable when testing other branches/commits
  ; than the default pinned 0.62-compatible core commit
  ; i.e: CORE_REPO_SHA=dde62cebffe519c35875af6d06fae053b3be65ec tox -e <env to test>
  CORE_REPO_SHA={env:CORE_REPO_SHA:37dea4bbdb1a3c83b96fc22c2f68a848b4989fb5}
  CORE_REPO=git+https://github.com/open-telemetry/opentelemetry-python.git@{env:CORE_REPO_SHA}
  UV_CONFIG_FILE={toxinidir}/tox-uv.toml

commands_pre =
; In order to get a health coverage report,
; we have to install packages in editable mode.
  coverage: python {toxinidir}/scripts/eachdist.py install --editable

commands =
  test-loongsuite-instrumentation-agentscope: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-agentscope/tests {posargs}
  lint-loongsuite-instrumentation-agentscope: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-agentscope
  
  test-loongsuite-instrumentation-dashscope: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-dashscope/tests {posargs}
  lint-loongsuite-instrumentation-dashscope: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-dashscope
  
  test-loongsuite-instrumentation-claude-agent-sdk: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-claude-agent-sdk/tests {posargs}
  lint-loongsuite-instrumentation-claude-agent-sdk: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-claude-agent-sdk

  test-loongsuite-instrumentation-google-adk: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-google-adk/tests {posargs}
  lint-loongsuite-instrumentation-google-adk: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-google-adk

  test-loongsuite-instrumentation-agno: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-agno/tests {posargs}
  lint-loongsuite-instrumentation-agno: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-agno
  
  test-loongsuite-instrumentation-dify: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-dify/tests {posargs}
  lint-loongsuite-instrumentation-dify: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-dify
  
  test-loongsuite-instrumentation-langchain: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-langchain/tests {posargs}
  lint-loongsuite-instrumentation-langchain: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-langchain

  test-loongsuite-instrumentation-langgraph: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-langgraph/tests {posargs}
  lint-loongsuite-instrumentation-langgraph: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-langgraph

  test-loongsuite-instrumentation-deepagents: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-deepagents/tests {posargs}
  lint-loongsuite-instrumentation-deepagents: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-deepagents

  test-loongsuite-instrumentation-qwen-agent: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-qwen-agent/tests {posargs}
  lint-loongsuite-instrumentation-qwen-agent: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-qwen-agent

  test-loongsuite-instrumentation-hermes-agent: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-hermes-agent/tests {posargs}
  lint-loongsuite-instrumentation-hermes-agent: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-hermes-agent

  test-loongsuite-instrumentation-mcp: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-mcp/tests {posargs}
  lint-loongsuite-instrumentation-mcp: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-mcp

  test-loongsuite-instrumentation-mem0: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-mem0/tests {posargs}
  lint-loongsuite-instrumentation-mem0: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-mem0

  test-loongsuite-instrumentation-crewai: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-crewai/tests {posargs}
  lint-loongsuite-instrumentation-crewai: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-crewai

  test-util-genai: pytest {toxinidir}/util/opentelemetry-util-genai/tests {posargs}
  lint-util-genai: sh -c "cd util && pylint --rcfile ../.pylintrc opentelemetry-util-genai"

  ; This env covers the detector and selector scripts used by dynamic LoongSuite CI.
  test-detect-loongsuite-changes: pytest {toxinidir}/.github/scripts/tests {posargs}

  test-loongsuite-instrumentation-litellm: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-litellm/tests {posargs}
  lint-loongsuite-instrumentation-litellm: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-litellm

  test-loongsuite-instrumentation-qwenpaw: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-qwenpaw/tests {posargs}
  lint-loongsuite-instrumentation-qwenpaw: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-qwenpaw

  test-loongsuite-instrumentation-algotune: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-algotune/tests {posargs}
  lint-loongsuite-instrumentation-algotune: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-algotune

  test-loongsuite-instrumentation-bfclv4: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-bfclv4/tests {posargs}
  lint-loongsuite-instrumentation-bfclv4: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-bfclv4

  test-loongsuite-instrumentation-claw-eval: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-claw-eval/tests {posargs}
  lint-loongsuite-instrumentation-claw-eval: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-claw-eval

  test-loongsuite-instrumentation-minisweagent: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-minisweagent/tests {posargs}
  lint-loongsuite-instrumentation-minisweagent: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-minisweagent

  test-loongsuite-instrumentation-openhands: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-openhands/tests {posargs}
  lint-loongsuite-instrumentation-openhands: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-openhands

  test-loongsuite-instrumentation-slop-code: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-slop-code/tests {posargs}
  lint-loongsuite-instrumentation-slop-code: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-slop-code

  test-loongsuite-instrumentation-terminus2: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-terminus2/tests {posargs}
  lint-loongsuite-instrumentation-terminus2: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-terminus2

  test-loongsuite-instrumentation-vita: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-vita/tests {posargs}
  lint-loongsuite-instrumentation-vita: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-vita

  test-loongsuite-instrumentation-webarena: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-webarena/tests {posargs}
  lint-loongsuite-instrumentation-webarena: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-webarena

  test-loongsuite-instrumentation-widesearch: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-widesearch/tests {posargs}
  lint-loongsuite-instrumentation-widesearch: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-widesearch

  test-loongsuite-instrumentation-wildtool: pytest {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-wildtool/tests {posargs}
  lint-loongsuite-instrumentation-wildtool: python -m ruff check {toxinidir}/instrumentation-loongsuite/loongsuite-instrumentation-wildtool

  ; TODO: add coverage commands
  ; coverage: {toxinidir}/scripts/coverage.sh

[testenv:check-license-header]
deps =
allowlist_externals =
  python
commands =
  python {toxinidir}/scripts/loongsuite/check_license_header.py --check

[testenv:fix-license-header]
deps =
allowlist_externals =
  python
commands =
  python {toxinidir}/scripts/loongsuite/check_license_header.py --fix

[testenv:generate-loongsuite]
deps =
  -r {toxinidir}/gen-requirements.txt

allowlist_externals =
  {toxinidir}/scripts/loongsuite/generate_loongsuite_bootstrap.py
  {toxinidir}/scripts/loongsuite/generate_loongsuite_readme.py
  pytest

commands =
  {toxinidir}/scripts/loongsuite/generate_loongsuite_bootstrap.py
  {toxinidir}/scripts/loongsuite/generate_loongsuite_readme.py

[testenv:docs]
deps =
  -c {toxinidir}/dev-requirements.txt
  -r {toxinidir}/docs-requirements.txt
  pytest
  {[testenv]test_deps}
  ; TODO: add docs for loongsuite instrumentation

changedir = docs

commands =
  sphinx-build -E -a -W -b html -T . _build/html

