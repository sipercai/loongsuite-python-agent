    body: |-
      {
        "messages": [
          {
            "role": "system",
            "content": "You are Hermes Agent, an intelligent AI assistant created by Nous Research. You are helpful, knowledgeable, and direct. You assist users with a wide range of tasks including answering questions, writing and editing code, analyzing information, creative work, and executing actions via your tools. You communicate clearly, admit uncertainty when appropriate, and prioritize being genuinely useful over being verbose unless otherwise directed below. Be targeted and efficient in your exploration and investigations.\n\nYou have persistent memory across sessions. Save durable facts using the memory tool: user preferences, environment details, tool quirks, and stable conventions. Memory is injected into every turn, so keep it compact and focused on facts that will still matter later.\nPrioritize what reduces future user steering — the most valuable memory is one that prevents the user from having to correct or remind you again. User preferences and recurring corrections matter more than procedural task details.\nDo NOT save task progress, session outcomes, completed-work logs, or temporary TODO state to memory; use session_search to recall those from past transcripts. If you've discovered a new way to do something, solved a problem that could be necessary later, save it as a skill with the skill tool.\n\nConversation started: Thursday, April 16, 2026 03:38 PM\nModel: qwen-turbo\nProvider: dashscope"
          },
          {
            "role": "user",
            "content": "请务必调用 memory 工具，把“我的最爱颜色是蓝色”保存到 memory，然后只回复：已保存。"
          }
        ],
        "model": "qwen-turbo",
        "stream": true,
        "stream_options": {
          "include_usage": true
        },
        "tools": [
          {
            "type": "function",
            "function": {
              "name": "memory",
              "description": "Save durable information to persistent memory that survives across sessions. Memory is injected into future turns, so keep it compact and focused on facts that will still matter later.\n\nWHEN TO SAVE (do this proactively, don't wait to be asked):\n- User corrects you or says 'remember this' / 'don't do that again'\n- User shares a preference, habit, or personal detail (name, role, timezone, coding style)\n- You discover something about the environment (OS, installed tools, project structure)\n- You learn a convention, API quirk, or workflow specific to this user's setup\n- You identify a stable fact that will be useful again in future sessions\n\nPRIORITY: User preferences and corrections > environment facts > procedural knowledge. The most valuable memory prevents the user from having to repeat themselves.\n\nDo NOT save task progress, session outcomes, completed-work logs, or temporary TODO state to memory; use session_search to recall those from past transcripts.\nIf you've discovered a new way to do something, solved a problem that could be necessary later, save it as a skill with the skill tool.\n\nTWO TARGETS:\n- 'user': who the user is -- name, role, preferences, communication style, pet peeves\n- 'memory': your notes -- environment facts, project conventions, tool quirks, lessons learned\n\nACTIONS: add (new entry), replace (update existing -- old_text identifies it), remove (delete -- old_text identifies it).\n\nSKIP: trivial/obvious info, things easily re-discovered, raw data dumps, and temporary task state.",
              "parameters": {
                "type": "object",
                "properties": {
                  "action": {
                    "type": "string",
                    "enum": [
                      "add",
                      "replace",
                      "remove"
                    ],
                    "description": "The action to perform."
                  },
                  "target": {
                    "type": "string",
                    "enum": [
                      "memory",
                      "user"
                    ],
                    "description": "Which memory store: 'memory' for personal notes, 'user' for user profile."
                  },
                  "content": {
                    "type": "string",
                    "description": "The entry content. Required for 'add' and 'replace'."
                  },
                  "old_text": {
                    "type": "string",
                    "description": "Short unique substring identifying the entry to replace or remove."
                  }
                },
                "required": [
                  "action",
                  "target"
                ]
              }
            }
          }
        ]
      }
